# Réplica de Kali Linux - Modo Pastel de Alto Contraste para Starship
format = """
[](#cba6f7)\
$os\
$username\
[](bg:#89b4fa fg:#cba6f7)\
$directory\
[](bg:#94e2d5 fg:#89b4fa)\
$git_branch\
$git_status\
[](fg:#94e2d5)\
$fill\
$python\
$rust\
$cmd_duration\
$status
$character"""

[os]
disabled = false
# Fondo pastel morado, texto negro puro y en negrita
format = "[ $symbol ](bg:#cba6f7 fg:black bold)"

[os.symbols]
Arch = "󰣇"
Linux = ""

[username]
show_always = true
style_user = "bg:#cba6f7 fg:black bold"
style_root = "bg:#cba6f7 fg:red bold"
format = "[$user]($style)"

[directory]
# Fondo pastel azul, texto negro puro y en negrita
style = "bg:#89b4fa fg:black bold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bg:#94e2d5 fg:black bold"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:#94e2d5 fg:black bold"
format = "[($all_status$ahead_behind )]($style)"

[fill]
symbol = " "

[python]
symbol = " "
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
format = "[$symbol($version )]($style)"

[cmd_duration]
min_time = 500
format = " [ $duration ](grey)"

[status]
disabled = false
format = '[\[$symbol $common_meaning$int\]]($style)'
symbol = "✘"
success_symbol = "✔"

[character]
success_symbol = "[╰─󰄛](bold #cba6f7) "
error_symbol = "[╰─󰄛](bold red) "
